<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gustudio</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f7;
      color: #222;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 520px;
      padding: 40px 20px 60px;
    }

    .cover {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin: 20px 0 6px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    audio {
      width: 100%;
      margin: 20px 0;
    }

    .description {
      font-size: 14px;
      line-height: 1.6;
      color: #444;
      margin-top: 10px;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- 封面 -->
    <img class="cover" src="2026ep01cover.png" alt="Podcast Cover" />

    <!-- 播放器 -->
    <audio controls>
      <source src="2026ep01.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <!-- 简介 -->
    <div class="description">
      2026.04.05<br>
      又清明<br>
      慢悠悠的春天里 <br>
      all parodox
    
    </div>

    <footer>
      © 2026 Gustudio
    </footer>

  </div>
</body>
</html>
