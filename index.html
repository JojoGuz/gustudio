<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gustudio</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f7;
      color: #222;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 520px;
      padding: 40px 20px 60px;
    }

    .cover {
      width: 100%;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin: 20px 0 6px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    audio {
      width: 100%;
      margin: 20px 0;
    }

    .description {
      font-size: 14px;
      line-height: 1.6;
      color: #444;
      margin-top: 10px;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }

    .episode {
  margin-bottom: 40px;
}

.divider {
  height: 1px;
  background: #e5e5e5;
  margin: 40px 0;
}
    
  </style>
</head>
<body>

  <div class="container">

     <!-- 第三期 -->
    <div class="episode">
      <img class="cover" src="2026ep03cover.png" alt="Podcast Cover" />

      <audio controls>
        <source src="2026ep03.mp3" type="audio/mpeg">
      </audio>

      <div class="description">
        2026.05.03<br>
        两百年前玛丽·沃斯通克拉夫特的犀利<br>
        一百年前弗吉尼亚·伍尔夫的细腻<br>
        女性对自己的要求应该是怎样的
      </div>
    </div>

    <!-- 分隔线 -->
    <div class="divider"></div>

    <!-- 第二期 -->
    <div class="episode">
      <img class="cover" src="2026ep02cover.png" alt="Podcast Cover" />

      <audio controls>
        <source src="2026ep02.mp3" type="audio/mpeg">
      </audio>

      <div class="description">
        2026.04.19<br>
        我们到底如何看待“人”<br>
        是作为一个具体的个体，<br>
        还是作为某种身份、角色，甚至工具。
      </div>
    </div>

    <!-- 分隔线 -->
    <div class="divider"></div>

    <!-- 第一期 -->
    <div class="episode">
      <img class="cover" src="2026ep01cover-b.png" alt="Podcast Cover" />

      <audio controls>
        <source src="2026ep01.mp3" type="audio/mpeg">
      </audio>

      <div class="description">
        2026.04.05<br>
        又清明<br>
        慢悠悠的春天里 <br>
        all paradox
      </div>
    </div>

    <footer>
      © 2026 Gustudio
    </footer>

  </div>

</body>
